<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Flow · Sign in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="auth-shell">
      <div class="auth-card">
        <div class="brand-block">
          <div class="brand-mark">TF</div>
          <div>
            <h1>Task Flow</h1>
            <p>Project operations workspace</p>
          </div>
        </div>

        <h2>Sign in to continue</h2>
        <p class="auth-copy">Use the seeded admin account to access the dashboard, projects, and tasks.</p>

        <form id="login-form" class="auth-form">
          <label>
            Email
            <input id="email" name="email" type="email" value="admin@example.com" required />
          </label>
          <label>
            Password
            <input id="password" name="password" type="password" value="adminpass" required />
          </label>
          <button class="primary-btn" type="submit">Sign in</button>
        </form>

        <p id="auth-message" class="auth-message">Demo credentials: admin@example.com / adminpass</p>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
