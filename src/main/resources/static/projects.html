<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Flow · Projects</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <aside class="sidebar">
        <div class="brand-block">
          <div class="brand-mark">TF</div>
          <div>
            <h1>Task Flow</h1>
            <p>Project operations center</p>
          </div>
        </div>

        <nav class="nav-links">
          <a href="/dashboard.html">Dashboard</a>
          <a class="active" href="/projects.html">Projects</a>
          <a href="/tasks.html">Tasks</a>
          <a href="/labels.html">Labels</a>
          <a href="/">Sign out</a>
        </nav>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div>
            <p class="eyebrow">Projects</p>
            <h2>Delivery initiatives</h2>
          </div>
          <button id="logout-btn" class="secondary-btn" type="button">Sign out</button>
        </header>

        <section class="panel">
          <div class="panel-header">
            <div>
              <p class="eyebrow">New</p>
              <h3>Create a project</h3>
            </div>
          </div>
          <form id="create-project-form" class="field-grid">
            <div class="field"><label>Name</label><input type="text" name="name" required /></div>
            <div class="field"><label>Key (2-10 uppercase letters)</label><input type="text" name="key" required pattern="[A-Za-z]{2,10}" /></div>
            <div class="field-grid single" style="grid-column: 1 / -1;">
              <div class="field"><label>Description</label><textarea name="description"></textarea></div>
            </div>
            <div class="field" style="align-self:end;"><button type="submit" class="primary-btn">Create project</button></div>
          </form>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Overview</p>
              <h3>All projects</h3>
            </div>
          </div>
          <div id="projects-page-list" class="list-stack"></div>
          <div id="projects-pagination" class="pagination-bar"></div>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
